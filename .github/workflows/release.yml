name: Build and push the latest api

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
    semver:
      name: Check release SemVer
      runs-on: ubuntu-latest
      outputs:
        version: ${{ steps.check.outputs.VERSION }}
        version_valid: ${{ steps.check.outputs.VERSION_VALID }}
      steps:
        - name: Extract tag name
          run: |
            TAG_NAME="${GITHUB_REF##*/}"
            echo "Raw tag: $TAG_NAME"
            echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

        - name: Check if tag matches SemVer and starts with 'v'
          id: check
          run: |
            if [[ "$TAG_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              VERSION="${TAG_NAME:1}"  # Remove leading 'v'
              echo "Tag is valid SemVer with 'v' prefix: $TAG_NAME"
              echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
              echo "VERSION_VALID='true'" >> "$GITHUB_OUTPUT"
            else
              echo "VERSION_VALID='false'" >> "$GITHUB_OUTPUT"
              echo "::warning::Tag '$TAG_NAME' is not in 'vMAJOR.MINOR.PATCH' format. Aborting gracefully."
            fi

    build:
      name: Build Docker Image
      needs: [semver]
      if: ${{ needs.semver.outputs.version_valid == 'true' }}
      runs-on: ubuntu-latest
      steps:
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            registry: quay.io
            username: ${{ secrets.QUAY_USERNAME }}
            password: ${{ secrets.QUAY_PASSWORD }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build and push
          uses: docker/build-push-action@v6
          with:
            push: true
            tags: quay.io/microbiome-informatics/hmmer-api:${{ needs.semver.outputs.version }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

