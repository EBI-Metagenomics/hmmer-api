name: Build and push the api

on:
    push:
    workflow_dispatch:

jobs:
    build:
      name: Build
      runs-on: ubuntu-latest
      steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker tags
        id: build-tags
        run: |
          if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
            TAGS="quay.io/microbiome-informatics/hmmer-api:production-latest"
          fi

          if [[ $GITHUB_REF == 'refs/heads/development' ]]; then
            TAGS="quay.io/microbiome-informatics/hmmer-api:development-latest"
          fi

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            TAGS="quay.io/microbiome-informatics/hmmer-api:${TAG_NAME}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
            registry: quay.io
            username: ${{ secrets.QUAY_USERNAME }}
            password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
            push: true
            tags: ${{ steps.build-tags.outputs.tags }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
