name: Build and push the api

on:
    push:
    workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
    build:
      name: Build
      runs-on: ubuntu-latest
      steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up environment variables
        run: |
          if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=development" >> $GITHUB_ENV
          fi

          # Extract tag name if this is a tag push
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker tags
        id: build-tags
        run: |
          TAGS="quay.io/microbiome-informatics/hmmer-api:${{ env.ENVIRONMENT }}-latest"
          
          # Add tag-specific image tag if this push originated from a tag
          if [[ "${{ env.IS_TAG }}" == "true" ]]; then
            TAGS="$TAGS,quay.io/microbiome-informatics/hmmer-api:${{ env.TAG_NAME }}"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
            registry: quay.io
            username: ${{ secrets.QUAY_USERNAME }}
            password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
            push: true
            tags: ${{ steps.build-tags.outputs.tags }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
